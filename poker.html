<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sit &amp; Go Hold'em</title>
<style>
:root{
  --bg:#11141a; --panel:#1b2029; --panel2:#232a36; --line:#323b4a;
  --text:#e8ebf0; --dim:#8d99ab; --gold:#e8b64c; --red:#e2574c; --blue:#4c8fe2; --green:#2e7d4f;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);overflow:hidden;}
.hidden{display:none !important;}

/* ---------- SETUP ---------- */
#setup{height:100%;display:flex;align-items:center;justify-content:center;}
.setup-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:36px 42px;width:430px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.setup-card h1{font-size:25px;margin-bottom:4px;letter-spacing:.3px;}
.setup-card .sub{color:var(--dim);font-size:13px;margin-bottom:26px;}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.row label.main{font-weight:600;font-size:15px;}
.stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;background:var(--panel2);}
.stepper button{width:34px;height:34px;background:none;border:none;color:var(--gold);font-size:18px;cursor:pointer;}
.stepper span{width:34px;text-align:center;font-weight:600;}
select{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:14px;}
input[type=checkbox]{width:20px;height:20px;accent-color:var(--gold);cursor:pointer;}
.radios{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.radios label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--text);}
.radios input{accent-color:var(--gold);width:16px;height:16px;cursor:pointer;}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.seg button{background:var(--panel2);border:none;color:var(--dim);padding:8px 16px;font-size:14px;cursor:pointer;font-weight:600;}
.seg button.on{background:var(--gold);color:#1a1408;}
#startBtn{width:100%;margin-top:8px;background:var(--gold);color:#1a1408;font-size:16px;font-weight:700;border:none;border-radius:10px;padding:13px;cursor:pointer;}
#startBtn:hover{filter:brightness(1.08);}
#resetRow{display:flex;gap:8px;margin-top:14px;align-items:stretch;}
#resetBtn{flex:1;background:none;border:1px solid var(--line);color:var(--dim);font-size:12.5px;border-radius:9px;padding:8px;cursor:pointer;}
#resetBtn:hover{color:#e2574c;border-color:#e2574c;}
#resetInfoBtn{background:none;border:1px solid var(--line);color:var(--dim);border-radius:9px;padding:0 11px;cursor:pointer;font-size:13px;}
#resetInfo{margin-top:8px;font-size:11.5px;line-height:1.5;color:var(--dim);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:9px;padding:9px 11px;}
#resumeBtn,#reviewBtn{width:100%;margin-top:8px;background:none;border:1px solid var(--gold);color:var(--gold);font-size:15px;font-weight:700;border-radius:10px;padding:11px;cursor:pointer;}
#resumeBtn:hover,#reviewBtn:hover{background:rgba(230,180,60,.12);}
#reviewBtn{border-color:var(--line);color:var(--text);font-weight:600;}
#ovBlunders{margin:12px 0 4px;text-align:left;max-height:38vh;overflow-y:auto;}
#ovBlunders h3{font-size:13px;color:var(--gold);margin-bottom:8px;text-align:center;}
#ovBlunders .bl-clean{color:#62d68a;}
#ovBlunders .bl-row{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--dim);border-top:1px solid var(--line);padding:6px 2px;align-items:center;}
#ovBlunders .bl-row b{color:#e2574c;white-space:nowrap;}
#ovBlunders .bl-row .bl-what{color:var(--text);}
#ovBlunders .bl-more{font-size:11px;color:var(--dim);text-align:center;padding-top:6px;}
.rp-nav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.rp-nav button{background:none;border:1px solid var(--line);border-radius:7px;color:var(--text);padding:4px 10px;cursor:pointer;font-size:12px;}
.rp-nav button:disabled{opacity:.35;cursor:default;}
.rp-nav span{font-size:12px;color:var(--gold);font-weight:600;}

/* ---------- GAME ---------- */
#game{height:100%;display:flex;flex-direction:column;}
#topbar{display:flex;align-items:center;gap:18px;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);font-size:13px;color:var(--dim);}
#topbar b{color:var(--text);font-weight:600;}
#quitBtn{margin-left:auto;background:none;border:1px solid var(--line);color:var(--dim);border-radius:7px;padding:5px 12px;cursor:pointer;font-size:12px;}
#quitBtn:hover{color:var(--text);border-color:var(--dim);}

#tableWrap{flex:1;position:relative;padding:14px;display:flex;gap:14px;min-height:0;}
#coach{width:268px;flex-shrink:0;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;overflow-y:auto;}
#coach h3{font-size:14px;margin-bottom:12px;color:var(--gold);letter-spacing:.4px;}
#coach .rec{display:inline-block;font-weight:800;font-size:17px;letter-spacing:.6px;padding:7px 16px;border-radius:9px;margin-bottom:14px;color:#fff;}
#coach .rec.FOLD{background:var(--red);}
#coach .rec.CALL{background:var(--blue);}
#coach .rec.CHECK{background:var(--green);}
#coach .rec.RAISE,#coach .rec.ALLIN{background:var(--gold);color:#1a1408;}
.coach-row{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;margin-bottom:8px;color:var(--dim);}
.coach-row b{color:var(--text);text-align:right;font-weight:600;}
#coach .why{font-size:12.5px;line-height:1.5;color:#c4cdd9;margin-top:12px;border-top:1px solid var(--line);padding-top:12px;}
#coach .waiting{color:var(--dim);font-size:13px;}
#gtoBox{margin-top:12px;border-top:1px solid var(--line);padding-top:11px;font-size:12px;color:var(--dim);}
#gtoBox h4{font-size:11px;color:#7fb6e8;letter-spacing:.5px;margin-bottom:7px;}
#gtoBox .grow{display:flex;justify-content:space-between;gap:6px;margin-bottom:4px;color:var(--text);font-variant-numeric:tabular-nums;}
#gtoBox .grow span:first-child{flex:1;}
#gtoBox .grow.top{color:var(--gold);font-weight:700;}
#gtoBox .gnote{margin-top:8px;font-size:10.5px;color:var(--dim);line-height:1.45;}
@media(max-width:980px){
  #coach{display:none;position:absolute;left:14px;top:14px;bottom:14px;z-index:40;box-shadow:0 14px 50px rgba(0,0,0,.65);}
  #coach.open{display:block;}
}
#tableArea{flex:1;position:relative;min-width:0;}
#felt{position:absolute;inset:16px 46px 32px 46px;background:radial-gradient(ellipse at center,#2e6b46 0%,#235236 60%,#1b3f2a 100%);border-radius:48% / 46%;border:10px solid #3a2c1c;box-shadow:inset 0 0 70px rgba(0,0,0,.55), 0 16px 50px rgba(0,0,0,.45);}

#centerArea{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);text-align:center;width:480px;}
#pot{font-size:14px;color:#ffe9b0;font-weight:600;margin-bottom:8px;text-shadow:0 1px 3px rgba(0,0,0,.6);}
#board{display:flex;gap:7px;justify-content:center;min-height:78px;}
#banner{margin-top:10px;font-size:15px;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7);min-height:22px;}
#nextHandBtn{margin-top:8px;background:var(--gold);color:#1a1408;border:none;border-radius:8px;padding:7px 18px;font-weight:700;cursor:pointer;font-size:13px;}

.card{position:relative;width:54px;height:76px;border-radius:7px;
  background:linear-gradient(160deg,#fffefa 0%,#f6f2e9 70%,#eee9db 100%);
  color:#22232a;box-shadow:0 3px 8px rgba(0,0,0,.45),inset 0 0 0 1px rgba(0,0,0,.07),inset 0 1px 0 rgba(255,255,255,.9);
  user-select:none;}
.card .ix{position:absolute;top:4px;left:5px;display:flex;flex-direction:column;align-items:center;line-height:1;font-weight:800;font-size:15px;}
.card .ix .si{font-size:11px;margin-top:1px;}
.card .ix.flip{top:auto;left:auto;bottom:4px;right:5px;transform:rotate(180deg);}
.card .pip{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;text-shadow:0 1px 1px rgba(0,0,0,.12);}
.card.red{color:#c8332b;}
.card.back{background:#46609f;box-shadow:0 3px 8px rgba(0,0,0,.45),inset 0 0 0 1px rgba(0,0,0,.25);}
.card.back::before{content:'';position:absolute;inset:0;border-radius:7px;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.13) 0 2.5px,transparent 2.5px 7px),
             repeating-linear-gradient(-45deg,rgba(255,255,255,.10) 0 2.5px,transparent 2.5px 7px);}
.card.back::after{content:'';position:absolute;inset:4px;border:1.5px solid rgba(255,255,255,.55);border-radius:4px;}
.card.small{width:40px;height:57px;border-radius:5px;}
.card.small .ix{font-size:12px;top:3px;left:4px;}
.card.small .ix .si{font-size:9px;}
.card.small .ix.flip{display:none;}
.card.small .pip{font-size:21px;}
.card.small.back::after{inset:3px;}

.seat{position:absolute;width:150px;margin-left:-75px;margin-top:-46px;text-align:center;transition:opacity .3s;}
.seat .hole{display:flex;gap:4px;justify-content:center;min-height:58px;margin-bottom:4px;}
.seat .hole .card{transform:rotate(-3deg);}
.seat .hole .card+.card{transform:rotate(3deg);margin-left:-6px;}
.seat .plate{display:inline-flex;align-items:center;gap:8px;background:rgba(14,17,22,.88);border:2px solid #39424f;border-radius:12px;padding:5px 12px 5px 7px;min-width:118px;}
.seat.active .plate{border-color:var(--gold);box-shadow:0 0 14px rgba(232,182,76,.55);}
.seat.winner .plate{border-color:#62d68a;box-shadow:0 0 16px rgba(98,214,138,.6);}
.seat.folded{opacity:.45;}
.seat.busted{opacity:.25;}
.seat .avatar{font-size:23px;}
.seat .pname{font-size:12.5px;font-weight:700;text-align:left;}
.seat .pchips{font-size:10.5px;color:var(--gold);text-align:left;font-variant-numeric:tabular-nums;white-space:nowrap;}
.seat .lastact{font-size:11px;color:#cfd6e0;margin-top:3px;min-height:14px;text-shadow:0 1px 3px rgba(0,0,0,.7);}

.betchip{position:absolute;transform:translate(-50%,-60%);display:flex;flex-direction:column;align-items:center;gap:3px;}
.betchip .amt{background:rgba(10,12,16,.82);border:1px solid #4a5567;color:#ffe9b0;font-size:11px;font-weight:700;border-radius:20px;padding:2px 8px;font-variant-numeric:tabular-nums;}

/* ---------- poker chips ---------- */
.chipstack{display:inline-flex;align-items:flex-end;gap:3px;}
.chipcol{display:flex;flex-direction:column;}
.chip{width:20px;height:20px;border-radius:50%;background:var(--c);border:2.5px dashed rgba(255,255,255,.75);box-shadow:0 2px 3px rgba(0,0,0,.5),inset 0 0 0 3px rgba(255,255,255,.16);}
.chip+.chip{margin-top:-15px;}
.chipstack.sm .chip{width:16px;height:16px;border-width:2px;}
.chipstack.sm .chip+.chip{margin-top:-12px;}
#dbtn{position:absolute;width:24px;height:24px;border-radius:50%;background:#f3f0e6;color:#222;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);box-shadow:0 2px 5px rgba(0,0,0,.5);}

/* ---------- ACTION BAR ---------- */
#actionbar{background:var(--panel);border-top:1px solid var(--line);padding:12px 18px;min-height:88px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:relative;z-index:40;}
#actionbar .btn{border:none;border-radius:10px;padding:13px 26px;font-size:15px;font-weight:700;cursor:pointer;color:#fff;flex-shrink:0;white-space:nowrap;}
#foldBtn{background:var(--red);}
#callBtn{background:var(--blue);}
#raiseBtn{background:var(--gold);color:#1a1408;}
#actionbar .btn:disabled{opacity:.35;cursor:default;}
#raiseCtl{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap;}
#raiseSlider{flex:1;min-width:90px;accent-color:var(--gold);}
#raiseBtn{font-variant-numeric:tabular-nums;}
.preset{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;font-weight:600;flex-shrink:0;white-space:nowrap;}
.preset:hover{color:var(--text);}
#waitMsg{color:var(--dim);font-size:14px;}
#logToggle{background:none;border:1px solid var(--line);color:var(--dim);border-radius:7px;padding:6px 11px;cursor:pointer;font-size:12px;}
#log{position:absolute;left:10px;bottom:14px;width:300px;max-height:260px;overflow-y:auto;background:rgba(14,17,22,.93);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:11.5px;color:#b9c2cf;z-index:30;}
#log div{margin-bottom:2px;}

/* ---------- ANIMATIONS ---------- */
@keyframes dealIn{from{opacity:0;transform:translateY(-16px) scale(.78);}}
.card.deal{animation:dealIn .32s ease both;}
@keyframes flipIn{0%{opacity:0;transform:rotateY(90deg) scale(.9);}60%{opacity:1;}100%{transform:rotateY(0) scale(1);}}
.card.flip{animation:flipIn .4s ease both;}
@keyframes popIn{from{opacity:0;transform:scale(.35);}}
.betchip .chipstack{animation:popIn .25s ease both;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(232,182,76,.45);}50%{box-shadow:0 0 20px rgba(232,182,76,.85);}}
.seat.active .plate{animation:glowPulse 1.5s ease-in-out infinite;}
@keyframes winnerPop{0%{transform:scale(1);}35%{transform:scale(1.16);}100%{transform:scale(1);}}
.seat.winner .plate{animation:winnerPop .55s ease both;}
@keyframes bannerPop{0%{opacity:0;transform:translateY(6px) scale(.85);}60%{transform:translateY(0) scale(1.06);}100%{transform:scale(1);opacity:1;}}
#banner.show{animation:bannerPop .45s ease both;}
/* flying chips (slide-to-pot, push-to-winner) */
.flychip{position:absolute;z-index:35;pointer-events:none;transition:left .42s cubic-bezier(.45,.05,.3,1),top .42s cubic-bezier(.45,.05,.3,1),opacity .42s ease;}
@media(prefers-reduced-motion:reduce){.card.deal,.card.flip,.seat.winner .plate,#banner.show{animation:none;}.flychip{transition:none;}}

/* ---------- PERSONALITY / STATS / FEEDBACK ---------- */
.seat .pstyle{font-size:9.5px;color:#93a1b3;text-align:left;margin-top:1px;}
.seat .ppos{display:inline-block;font-size:9px;font-weight:800;color:#13161c;background:var(--gold);border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:1px;}
.seat .ppos:empty{display:none;}
#coachFeed{margin-top:14px;border-top:1px solid var(--line);padding-top:11px;font-size:12px;line-height:1.5;color:#c4cdd9;}
#coachFeed .pos{color:#62d68a;font-weight:700;}
#coachFeed .neg{color:#e2574c;font-weight:700;}
#coachFeed .dev{color:var(--dim);font-size:11.5px;margin-top:3px;}
#coachStats{margin-top:14px;border-top:1px solid var(--line);padding-top:11px;font-size:12px;color:var(--dim);}
#coachStats h4{font-size:11px;color:var(--gold);letter-spacing:.5px;margin-bottom:6px;}
#coachStats .srow{display:flex;justify-content:space-between;margin-bottom:4px;}
#coachStats .srow b{color:var(--text);font-weight:600;}

/* ---------- REPLAY OVERLAY ---------- */
#replayOv{position:fixed;inset:0;background:rgba(8,10,14,.85);display:flex;align-items:center;justify-content:center;z-index:60;}
.rp-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px 28px;width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.6);}
.rp-card h2{font-size:17px;margin-bottom:14px;}
.rp-board{display:flex;gap:6px;margin-bottom:16px;}
.rp-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #232a36;}
.rp-row .nm{flex:1;font-size:13px;font-weight:600;}
.rp-row .tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--panel2);color:var(--dim);}
.rp-row .tag.win{background:#1d4d30;color:#7fe2a5;}
.rp-row .hole{display:flex;gap:4px;}
.rp-result{margin:12px 0;font-size:13px;font-weight:600;color:#ffe9b0;}
.rp-log{max-height:150px;overflow-y:auto;background:var(--panel2);border-radius:9px;padding:10px 12px;font-size:11.5px;color:#b9c2cf;margin-bottom:16px;}
.rp-log div{margin-bottom:2px;}
#rpClose{background:var(--gold);color:#1a1408;border:none;border-radius:9px;padding:10px 24px;font-weight:700;cursor:pointer;}

/* ---------- OVERLAY ---------- */
#overlay{position:fixed;inset:0;background:rgba(8,10,14,.82);display:flex;align-items:center;justify-content:center;z-index:50;}
.over-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:40px 56px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.6);}
.over-card .big{font-size:44px;margin-bottom:10px;}
.over-card h2{font-size:23px;margin-bottom:6px;}
.over-card p{color:var(--dim);margin-bottom:24px;font-size:14px;}
.over-card button{background:var(--gold);color:#1a1408;border:none;border-radius:10px;padding:12px 30px;font-size:15px;font-weight:700;cursor:pointer;}

#coachClose{display:none;position:absolute;top:10px;right:12px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;z-index:2;}

/* forced landscape on phones: the game is rotated 90° when the device is held portrait */
body.fl{overflow:hidden;}
body.fl #game{position:fixed;top:0;left:0;transform-origin:left top;z-index:10;}

/* ================= MOBILE / TOUCH =================
   applies to phones AND any portrait screen up to 980px (large phones, small tablets,
   narrow browser windows) — desktop-sized seats never fit a portrait table */
@media(max-width:680px),(max-width:980px) and (orientation:portrait){
  body{overflow:hidden;}
  /* the start menu is taller than small screens: let it scroll instead of clipping */
  #setup{align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .setup-card{width:auto;max-width:94vw;padding:24px 22px;margin:max(10px,env(safe-area-inset-top)) auto max(24px,env(safe-area-inset-bottom));}
  .setup-card h1{font-size:21px;}
  .radios label,.seg button,select{font-size:13px;}
  /* modals: keep inside the viewport and scrollable */
  .over-card{padding:22px 16px;max-width:92vw;max-height:88vh;overflow-y:auto;}
  .rp-card{padding:16px 12px;}
  .rp-nav button{padding:5px 8px;font-size:11px;}
  .rp-nav span{font-size:11px;}

  /* top bar: compact, horizontally scrollable, hide low-value items */
  #topbar{gap:12px;padding:8px 10px;font-size:11.5px;overflow-x:auto;flex-wrap:nowrap;white-space:nowrap;-webkit-overflow-scrolling:touch;padding-top:max(8px,env(safe-area-inset-top));}
  #topbar::-webkit-scrollbar{display:none;}
  #tAnteWrap,#topbar .tb-opt{display:none;}
  #quitBtn{padding:6px 10px;}

  #tableWrap{padding:6px;}

  /* coach as a top sheet that slides down, leaving the action bar usable */
  #coach{position:fixed!important;left:6px;right:6px;top:0;bottom:auto!important;width:auto!important;max-height:66vh;overflow-y:auto;border-radius:0 0 16px 16px;transform:translateY(-112%);transition:transform .28s ease;display:block!important;z-index:90;box-shadow:0 18px 50px rgba(0,0,0,.7);padding-top:max(16px,env(safe-area-inset-top));}
  #coach.open{transform:translateY(0);}
  #coachClose{display:block;}

  /* smaller seats so 9 fit on a phone — but keep the text legible */
  .seat{width:102px;margin-left:-51px;margin-top:-32px;}
  .seat .plate{min-width:0;gap:5px;padding:5px 8px 5px 6px;border-radius:10px;}
  .seat .avatar{font-size:18px;}
  .seat .pname{font-size:11.5px;}
  .seat .pchips{font-size:10px;}
  .seat .pstyle{font-size:9.5px;}
  .seat .ppos{font-size:9px;padding:1px 4px;}
  .seat .lastact{font-size:11px;margin-top:2px;font-weight:600;}
  .seat .hole{min-height:46px;gap:3px;}
  /* short-handed tables (≤6 players) have room for bigger, clearer seats */
  body.few .seat{width:122px;margin-left:-61px;}
  body.few .seat .avatar{font-size:21px;}
  body.few .seat .pname{font-size:13px;}
  body.few .seat .pchips{font-size:11.5px;}
  body.few .seat .pstyle{font-size:10.5px;}
  body.few .seat .ppos{font-size:10px;}
  body.few .seat .lastact{font-size:12px;}

  /* tighter cards */
  .card{width:42px;height:60px;border-radius:6px;}
  .card .ix{font-size:12px;top:3px;left:4px;}
  .card .ix .si{font-size:9px;}
  .card .ix.flip{display:none;}
  .card .pip{font-size:22px;}
  .card.small{width:30px;height:43px;}
  .card.small .ix{font-size:9px;}
  .card.small .pip{font-size:15px;}
  #board{min-height:62px;gap:4px;}
  #centerArea{width:94vw;top:44%;}
  #pot{font-size:13px;}
  #felt{inset:8px 6px 8px 6px;border-width:7px;}
  #dbtn{width:20px;height:20px;font-size:10px;}

  /* big, thumb-friendly action bar */

  const d=a.slice();
  for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}

function evalFive(cs){
  const rs = cs.map(c=>c.r).sort((a,b)=>b-a);
  const flush = cs.every(c=>c.s===cs[0].s);
  const uniq=[...new Set(rs)];
  let straightHigh=0;
  if(uniq.length===5){
    if(uniq[0]-uniq[4]===4) straightHigh=uniq[0];
    else if(uniq[0]===14&&uniq[1]===5&&uniq[4]===2) straightHigh=5;
  }
  if(flush&&straightHigh) return [8,straightHigh];
  const counts={};
  for(const r of rs) counts[r]=(counts[r]||0)+1;
  const groups=Object.keys(counts).map(r=>[+r,counts[r]]).sort((a,b)=>b[1]-a[1]||b[0]-a[0]);
  if(groups[0][1]===4) return [7,groups[0][0],groups[1][0]];
  if(groups[0][1]===3&&groups[1][1]===2) return [6,groups[0][0],groups[1][0]];
  if(flush) return [5,...rs];

function chen(hole){
  const hi=hole[0].r>=hole[1].r?hole[0]:hole[1];
  const lo=hole[0].r>=hole[1].r?hole[1]:hole[0];
  let v = hi.r===14?10 : hi.r===13?8 : hi.r===12?7 : hi.r===11?6 : hi.r/2;
  if(hi.r===lo.r) return Math.max(5,v*2);
  if(hi.s===lo.s) v+=2;
  const gap=hi.r-lo.r-1;
  if(gap===1) v-=1; else if(gap===2) v-=2; else if(gap===3) v-=4; else if(gap>=4) v-=5;
  if(gap<=1 && hi.r<12) v+=1;
  return v;
}

function mcEquity(hole,board,opps,sims){
  const used=new Set();

  for(const c of board) used.add(c.r*4+c.s);
  const rest=FULL_DECK.filter(c=>!used.has(c.r*4+c.s)).slice();
  const need=opps*2+(5-board.length);
  let win=0;
  for(let t=0;t<sims;t++){
    for(let i=0;i<need;i++){
      const j=i+Math.floor(Math.random()*(rest.length-i));
      const tmp=rest[i];rest[i]=rest[j];rest[j]=tmp;
    }
    const fullBoard=board.concat(rest.slice(opps*2,need));
    const my=evalSeven(hole.concat(fullBoard));
    let res=1;
    for(let o=0;o<opps;o++){
      const os=evalSeven([rest[2*o],rest[2*o+1]].concat(fullBoard));
      const c=cmpScore(my,os);
      if(c<0){res=0;break;}
      if(c===0) res=Math.min(res,0.5);

  }

}

      const cap=typeof o==='number'?o:o.cap;

      let i=0,j=1;

    const need=5-board.length;
    for(let k=0;k<need;k++){const idx=k+Math.floor(Math.random()*(pool.length-k));const tmp=pool[k];pool[k]=pool[idx];pool[idx]=tmp;}

function combosInRange(cap,board,exclude,floor){
  const used=new Set(board.map(c=>c.r*4+c.s));
  for(const c of exclude||[]) used.add(c.r*4+c.s);
  const f=Math.min(floor||0,cap*0.5);
  const out=[];
  for(let i=0;i<52;i++)for(let j=i+1;j<52;j++){
    const a=FULL_DECK[i],b=FULL_DECK[j];
    if(used.has(a.r*4+a.s)||used.has(b.r*4+b.s))continue;
    const pct=handPct[holeCode([a,b])]||1;
    if(pct<=cap&&pct>f) out.push([a,b]);

  if(board.length<5){
    const d=detectDraws(combo,board);
    if(d.flush)v+=8e5; if(d.oesd)v+=6e5; else if(d.gutshot)v+=2.5e5;

}
function gtoSolve(opt){

  if(villCombos.length<NB*2||heroCombos.length<NB*2||eff<=0) return null;

    const scored=combos.map(c=>({c,v:comboStrength(c,board)})).sort((x,y)=>x.v-y.v);
    const B=Array.from({length:NB},()=>[]);

      else node.children.push({leaf:'sd',cH,cV});

        if(remain>bAdd*2.5){

}

function aiDecide(p){
  const callAmt=Math.min(state.currentBet-p.bet, p.chips);
  const pot=state.players.reduce((s,q)=>s+q.totalBet,0);
  const live=inHand().length;
  const d=state.cfg.difficulty;
  const stackBB=(p.chips+p.bet)/state.bb;

  let eq;
  if(state.stage==='preflop') eq=preflopEq(p.hole,live);
  else eq=mcEquity(p.hole,state.board,Math.min(live-1,3), d==='hard'?160:d==='medium'?70:35);

  const noise = d==='hard'?0.045 : d==='medium'?0.10 : 0.22;
  eq=clamp(eq+(Math.random()*2-1)*noise,0,1);
  const odds = callAmt>0 ? callAmt/(pot+callAmt) : 0;

  let posBonus=0;
  if(d==='hard'){
    const n=state.players.length;
    const dist=(p.i-state.dealerIdx+n)%n;            // 0 = dealer (late position)
    posBonus=(dist===0||dist===n-1)?0.04:0;
  }

  // Short-stack push/fold preflop (medium & hard)
  if(state.stage==='preflop' && stackBB<10 && d!=='easy'){
    if(eq>0.48+stackBB/45) return {type:'raise',amount:p.bet+p.chips};
    if(callAmt===0) return {type:'call'};
    if(eq>odds+0.12) return {type:'call'};
    return {type:'fold'};
  }

  const base=p.style||{margin:0,raiseT:0,raiseF:0,bluff:0,size:1,adapt:0};
  /* tournament pressure: shorter effective stacks => widen ranges, steal/fight more,
     scaled by each profile's adapt coefficient (shark adapts most, rock least) */
  const press=tourneyPressure(stackBB)*(base.adapt||0);
  const n=state.players.length;
  const late=((p.i-state.dealerIdx+n)%n)===0 || ((p.i-state.dealerIdx+n)%n)===n-1;
  const stealBoost = (late && state.stage==='preflop' && callAmt<=state.bb) ? press*0.18 : 0;
  const st={
    margin: base.margin - press*0.06,
    raiseT: base.raiseT - press*0.13 - stealBoost,
    raiseF: base.raiseF + press*0.28 + stealBoost,
    bluff:  base.bluff  + press*0.05,
    size:   base.size
  };

  if(callAmt===0){
    let betProb=0,bluffProb=0;
    if(d==='easy'){  betProb=eq>0.62?0.35:0; bluffProb=0.03; }
    if(d==='medium'){betProb=eq>0.55?0.65:0; bluffProb=0.06; }
    if(d==='hard'){  betProb=eq>0.52?0.85:0; bluffProb=(state.stage!=='preflop'&&live<=3)?0.15:0.05; }
    if(betProb>0) betProb=clamp(betProb+st.raiseF,0.05,0.95);
    bluffProb=Math.max(0,bluffProb+st.bluff);
    if(Math.random()<betProb || (eq<0.40&&Math.random()<bluffProb))
      return {type:'raise',amount:betTarget(p,pot,eq,d)};
    return {type:'call'};
  }

  const margin = (d==='easy'?-0.12 : d==='medium'?0.0 : 0.02-posBonus) + st.margin;
  const raiseThresh = (d==='easy'?0.82 : d==='medium'?0.68 : 0.64-posBonus) + st.raiseT;
  const raiseFreq   = clamp((d==='easy'?0.35 : d==='medium'?0.55 : 0.75) + st.raiseF, 0.05, 0.95);
  if(eq>raiseThresh && Math.random()<raiseFreq)
    return {type:'raise',amount:betTarget(p,pot,eq,d)};
  if(eq>=odds+margin) return {type:'call'};
  if(Math.random()<(d==='hard'?0.05:0.02)+st.bluff && callAmt<pot*0.4 && state.stage!=='preflop')
    return {type:'raise',amount:betTarget(p,pot,0.7,d)};
  return {type:'fold'};
}
function betTarget(p,pot,eq,d){
  const size=(p.style&&p.style.size)||1;
  let t;
  if(state.stage==='preflop'){
    t = (state.currentBet>state.bb ? state.currentBet*2.6 : state.bb*(2.5+Math.random()))*size;
  }else{
    const f = (d==='easy' ? (0.3+Math.random()*0.7) : (0.5+Math.random()*0.35))*size;
    t = state.currentBet + Math.max(state.lastRaiseSize, Math.round(pot*f));
  }
  if(eq>0.9 && Math.random()<0.35) t=p.bet+p.chips;
  t=Math.round(t/state.sb)*state.sb;
  return clamp(t, state.currentBet+state.lastRaiseSize, p.bet+p.chips);
}

/* ================= GAME STATE ================= */
let state=null;

function newGame(cfg){
  const startBlind=cfg.startBlind||BASE_BB;
  const levels=LEVELS.map(v=>Math.round(v*startBlind/BASE_BB/2)*2); // scale ladder, keep BB even so SB stays whole
  state={
    cfg, levels, level:0, handNum:0, board:[], stage:null, deck:[],
    currentBet:0, lastRaiseSize:0, turnIdx:0, players:[],
    gameOver:false, bb:levels[0], sb:levels[0]/2, ante:0, handOver:false
  };
  const stack=cfg.startBB*startBlind;
  const mk=(i,name,avatar,isHuman)=>({i,name,avatar,isHuman,chips:stack,hole:[],folded:false,out:false,allIn:false,bet:0,totalBet:0,acted:false,lastAct:'',revealed:false,place:0});
  state.players.push(mk(0, cfg.allAI?'Bot-You':'You', '😎', !cfg.allAI));
  const names=shuffle(AI_NAMES.map((n,k)=>[n,AI_AVATARS[k]]));
  const styles=shuffle(STYLES.concat(STYLES));
  for(let k=1;k<cfg.numPlayers;k++){
    const q=mk(k,names[k-1][0],names[k-1][1],false);
    q.style=styles[k-1];
    state.players.push(q);
  }
  state.sessStats={hands:0,won:0,net:0,biggest:0,decisions:0,followed:0,
    vpipH:0,pfrH:0,aBets:0,aCalls:0,sdSeen:0,sdWon:0,evLost:0};
  state.gameId=Date.now();
  state.gameDecisions=[];   // EV blunders this game
  state.gameHands=[];       // replayable hands this game
  state.dealerIdx=Math.floor(Math.random()*cfg.numPlayers);
  return state;
}

const alive =()=>state.players.filter(p=>!p.out);
const inHand=()=>state.players.filter(p=>!p.out&&!p.folded);
/* fast-forward when the human is no longer involved in decisions this hand */
const fastFwd=()=>!state.cfg.allAI&&(state.players[0].folded||state.players[0].out);
function nextSeat(from,pred){
  const n=state.players.length;
  for(let k=1;k<=n;k++){const j=(from+k)%n; if(pred(state.players[j])) return j;}
  return -1;
}
function payBet(p,amt){
  amt=Math.min(amt,p.chips);
  p.chips-=amt; p.bet+=amt; p.totalBet+=amt;
  if(p.chips===0) p.allIn=true;
  return amt;
}
function payAnte(p,amt){
  amt=Math.min(amt,p.chips);
  p.chips-=amt; p.totalBet+=amt;
  if(p.chips===0) p.allIn=true;
}

/* assign table positions for this hand, starting from the small blind */
function assignPositions(sbIdx){
  for(const p of state.players) p.pos='';
  const seats=[]; let j=sbIdx;
  do{ seats.push(j); j=nextSeat(j,q=>!q.out); }while(j!==sbIdx&&j!==-1);
  const n=seats.length;
  const names=[];
  if(n===2){ names.push('SB/BTN','BB'); }
  else{
    names.push('SB','BB');
    const m=n-2;
    for(let k=0;k<m;k++){
      const fromEnd=m-1-k;
      if(fromEnd===0) names.push('BTN');
      else if(fromEnd===1) names.push('CO');
      else if(fromEnd===2&&m>=4) names.push('HJ');
      else names.push(k===0?'UTG':k===1?'UTG+1':k===2?'MP':'MP+'+(k-2));
    }
  }
  seats.forEach((idx,k)=>state.players[idx].pos=names[k]||'');
}

/* ================= HAND FLOW ================= */
function startHand(){
  if(state.gameOver) return;
  state.handNum++;
  state.handOver=false;
  const per=SPEED_HANDS[state.cfg.speed];
  state.level=Math.min(Math.floor((state.handNum-1)/per), state.levels.length-1);
  state.bb=state.levels[state.level]; state.sb=state.bb/2;
  state.ante=state.cfg.ante ? Math.max(1,Math.round(state.bb*state.cfg.ante)) : 0;
  state.board=[]; state.stage='preflop';
  state.deck=shuffle(makeDeck());
  for(const p of state.players){
    p.hole=[]; p.folded=p.out; p.allIn=false; p.bet=0; p.totalBet=0;
    p.acted=false; p.lastAct=''; p.revealed=false; p.rangeCap=1; p.rangeFloor=0; p.checkedStreet=false;
  }
  state.dealerIdx=nextSeat(state.dealerIdx,p=>!p.out);
  const n=alive().length;
  let sbIdx,bbIdx;
  if(n===2){ sbIdx=state.dealerIdx; bbIdx=nextSeat(sbIdx,p=>!p.out); }
  else { sbIdx=nextSeat(state.dealerIdx,p=>!p.out); bbIdx=nextSeat(sbIdx,p=>!p.out); }
  for(const p of alive()) if(state.ante) payAnte(p,state.ante);
  assignPositions(sbIdx);
  payBet(state.players[sbIdx],state.sb); state.players[sbIdx].lastAct='SB '+usd(state.sb);
  payBet(state.players[bbIdx],state.bb); state.players[bbIdx].lastAct='BB '+usd(state.bb);
  state.currentBet=state.bb; state.lastRaiseSize=state.bb;
  for(const p of alive()) p.hole=[state.deck.pop(),state.deck.pop()];
  /* per-hand trackers */
  state.handLog=[]; state.humanDecisions=[]; state.humanWonAmt=0; state.resultText='';
  state.humanHandStats={vpip:false,pfr:false,aBets:0,aCalls:0,sd:false,sdWon:false};
  state.humanStart=state.players[0].chips+state.players[0].totalBet;
  state.humanPlayed=!state.players[0].out;
  prevBoardLen=0; coachRecNow=null;
  sfx('deal');
  log(`— Hand #${state.handNum} · blinds ${usd(state.sb)}/${usd(state.bb)}${state.ante?' ante '+usd(state.ante):''} —`);
  showBanner('');
  hideNextBtn();
  const first=nextSeat(bbIdx,p=>!p.out&&!p.folded&&!p.allIn);
  render();
  if(first===-1 || alive().filter(p=>!p.allIn).length<=1){
    // everyone all-in from blinds/antes
    refundUncalled(); runout();
  } else beginRound(first);
}

function beginRound(firstIdx){ state.turnIdx=firstIdx; promptNext(); }

function findNextActor(){
  const n=state.players.length;
  for(let k=0;k<n;k++){
    const j=(state.turnIdx+k)%n;
    const p=state.players[j];
    if(p.out||p.folded||p.allIn) continue;
    if(!p.acted||p.bet<state.currentBet) return j;
  }
  return -1;
}

function promptNext(){
  if(state.gameOver||state.handOver) return;
  if(inHand().length===1) return endHandFold();
  const j=findNextActor();
  if(j===-1) return endRound();
  state.turnIdx=j;
  const p=state.players[j];
  render();
  if(p.isHuman){
    showActions(p);
  }else{
    let delay=AI_DELAY_MIN+Math.random()*(AI_DELAY_MAX-AI_DELAY_MIN);
    if(fastFwd()) delay=Math.min(delay,120+Math.random()*120);
    setTimeout(()=>{
      if(state.gameOver||state.handOver) return;
      const dec=aiDecide(p);
      applyAction(p,dec.type,dec.amount);
      state.turnIdx=(j+1)%state.players.length;
      promptNext();
    },delay);
  }
}

function applyAction(p,type,amt){
  const callAmt=state.currentBet-p.bet;
  if(type==='fold'){
    p.folded=true; p.lastAct='Fold'; sfx('fold');
  }else if(type==='call'){
    const paid=payBet(p,callAmt);
    p.lastAct = callAmt<=0 ? 'Check' : (p.allIn?'All-in '+usd(p.bet):'Call '+usd(paid));
    sfx(callAmt<=0?'check':'chip');
    if(callAmt>0){
      narrowRange(p, state.stage==='preflop'?0.35:0.50);
      p.rangeFloor=(p.rangeFloor||0)*0.5;   // calling after checking: medium strength, weakness read fades
    }else if(state.stage!=='preflop'){
      weakenRange(p);                        // a check usually means no strong hand
      p.checkedStreet=true;
    }
  }else if(type==='raise'){
    let target=Math.min(amt,p.bet+p.chips);
    const minTarget=state.currentBet+state.lastRaiseSize;
    if(target<minTarget) target=Math.min(minTarget,p.bet+p.chips);
    if(target<=state.currentBet){ // can't actually raise -> treat as call
      return applyAction(p,'call');
    }
    payBet(p,target-p.bet);
    const raiseSize=target-state.currentBet;
    if(raiseSize>=state.lastRaiseSize){
      state.lastRaiseSize=raiseSize;
      for(const q of state.players) if(q!==p&&!q.folded&&!q.allIn&&!q.out) q.acted=false;
    }
    state.currentBet=target;
    p.lastAct=(p.allIn?'All-in ':'Raise to ')+usd(target);
    sfx('chip');
    /* the bigger the raise relative to the pot, the narrower the credible range */
    const potNow=state.players.reduce((s,q)=>s+q.totalBet,0);
    const ratio=raiseSize/Math.max(potNow-raiseSize,state.bb);
    let cap=state.stage==='preflop'?0.15:0.25;
    if(ratio>=1.2) cap*=0.35;        // overbet / jam → very strong
    else if(ratio>=0.8) cap*=0.55;   // pot-sized
    else if(ratio>=0.5) cap*=0.8;    // 2/3-pot-ish
    if(p.checkedStreet){ cap*=0.5; } // check-raise: the check was a trap — extra strong
    p.rangeFloor=0;                  // betting cancels any weakness read
    narrowRange(p, cap);
  }
  p.acted=true;
  log(`${p.name}: ${p.lastAct}`);
  render();
}

/* narrow a player's assumed range after a show of strength, scaled by personality */
function narrowRange(p,cap){
  const mult = p.style ? ({rock:0.7,station:1.4,shark:1.0,maniac:1.7})[p.style.id]||1 : 1;
  p.rangeCap=clamp(Math.min(p.rangeCap, cap*mult),0.03,1);
}
/* a check usually denies a strong hand: trim the TOP of the assumed range.
   Maniacs/stations bet whenever strong, so their checks say the most;
   sharks trap sometimes, so theirs say the least. */
function weakenRange(p){
  const mult = p.style ? ({rock:1.0,station:1.2,shark:0.6,maniac:1.4})[p.style.id]||1 : 1;
  p.rangeFloor=clamp((p.rangeFloor||0)+0.07*mult, 0, 0.25);
}
function refundUncalled(){
  let maxB=0,second=0,who=null;
  for(const p of state.players){
    if(p.bet>maxB){second=maxB;maxB=p.bet;who=p;}
    else if(p.bet>second)second=p.bet;
  }
  if(who&&maxB>second){
    const r=maxB-second;
    who.chips+=r; who.bet-=r; who.totalBet-=r;
    if(who.allIn&&who.chips>0) who.allIn=false;
  }
}

function endRound(){
  refundUncalled();
  if(state.players.some(p=>p.bet>0)) animateChipsToPot();
  for(const p of state.players){p.bet=0;p.acted=false;p.checkedStreet=false;}
  state.currentBet=0; state.lastRaiseSize=state.bb;
  const live=inHand();
  if(live.length===1) return endHandFold();
  if(state.stage==='river') return showdown();
  const canAct=live.filter(p=>!p.allIn);
  if(canAct.length<=1) return runout();
  dealNext();
  render();
  const first=nextSeat(state.dealerIdx,p=>!p.out&&!p.folded&&!p.allIn);
  beginRound(first);
}

function dealNext(){
  if(state.stage==='preflop'){ state.board.push(state.deck.pop(),state.deck.pop(),state.deck.pop()); state.stage='flop'; }
  else if(state.stage==='flop'){ state.board.push(state.deck.pop()); state.stage='turn'; }
  else if(state.stage==='turn'){ state.board.push(state.deck.pop()); state.stage='river'; }
  log(`— ${state.stage[0].toUpperCase()+state.stage.slice(1)}: ${state.board.map(c=>RANK_CH[c.r]+SUIT_CH[c.s]).join(' ')} —`);
  sfx('deal');
}

function runout(){
  for(const p of inHand()) p.revealed=true;
  render();
  const d=fastFwd()?Math.min(RUNOUT_DELAY,320):RUNOUT_DELAY;
  const step=()=>{
    if(state.gameOver) return;
    if(state.stage==='river'){ setTimeout(showdown,d*0.8); return; }
    dealNext(); render();
    setTimeout(step,d);
  };
  setTimeout(step,d*0.8);
}

function endHandFold(){
  state.handOver=true;
  refundUncalled();
  if(state.players.some(p=>p.bet>0)) animateChipsToPot();
  const w=inHand()[0];
  const pot=state.players.reduce((s,p)=>s+p.totalBet,0);
  w.chips+=pot;
  for(const p of state.players){ p.totalBet=0; p.bet=0; }
  state.resultText=`${w.name} ${w.isHuman?'win':'wins'} ${money(pot)} (everyone folded)`;
  if(w.isHuman){state.humanWonAmt=pot;sfx('win');haptic([14,40,14]);}
  log(state.resultText);
  showBanner(`${w.name} ${w.isHuman?'win':'wins'} ${money(pot)}`);
  render([w]);
  setTimeout(()=>animatePotToWinner([w]),300);
  finishHand(FOLDWIN_PAUSE);
}

function showdown(){
  state.handOver=true;
  const live=inHand();
  for(const p of live) p.revealed=true;
  const scores=new Map();
  for(const p of live) scores.set(p,evalSeven(p.hole.concat(state.board)));
  // side pots by contribution level
  const lvls=[...new Set(state.players.filter(p=>p.totalBet>0).map(p=>p.totalBet))].sort((a,b)=>a-b);
  let prev=0;
  const winnings=new Map();
  let mainWinners=[];
  for(const lvl of lvls){
    let amt=0;
    for(const p of state.players) amt+=Math.max(0,Math.min(p.totalBet,lvl)-prev);
    let elig=live.filter(p=>p.totalBet>=lvl);
    if(elig.length===0) elig=live; // safety (shouldn't occur after refunds)
    let best=null,winners=[];
    for(const p of elig){
      const s=scores.get(p);
      if(!best||cmpScore(s,best)>0){best=s;winners=[p];}
      else if(cmpScore(s,best)===0)winners.push(p);
    }
    const share=Math.floor(amt/winners.length/5)*5;
    let rem=amt-share*winners.length;
    for(const w of winners){
      const add=share+(rem>0?rem:0); rem=0;
      w.chips+=add;
      winnings.set(w,(winnings.get(w)||0)+add);
    }
    mainWinners=winners;
    prev=lvl;
  }
  for(const p of state.players) p.totalBet=0;
  const parts=[];
  for(const [w,amt] of winnings){
    if(amt<=0) continue;
    parts.push(`${w.name} ${w.isHuman?'win':'wins'} ${money(amt)} with ${handName(scores.get(w))}`);
    log(`${w.name} ${w.isHuman?'win':'wins'} ${money(amt)} — ${handName(scores.get(w))}`);
  }
  state.resultText=parts.join(' · ');
  const hw=winnings.get(state.players[0])||0;
  if(hw>0){state.humanWonAmt=hw;sfx('win');haptic([14,40,14]);}
  showBanner(parts.join(' · '));
  render([...winnings.keys()]);
  setTimeout(()=>animatePotToWinner([...winnings.keys()]),300);
  finishHand(SHOWDOWN_PAUSE);
}

function finishHand(pause){
  if(fastFwd()) pause=Math.min(pause,1300);
  /* snapshot for replay */
  lastHand={
    num:state.handNum,
    board:state.board.slice(),
    result:state.resultText,
    log:(state.handLog||[]).slice(),
    players:state.players.filter(q=>q.hole.length>0).map(q=>({
      name:q.name,avatar:q.avatar,hole:q.hole.slice(),folded:q.folded&&!q.isHuman||q.folded,
      won:state.resultText.includes(q.name+' win')
    }))
  };
  /* stats + coach feedback */
  if(!state.cfg.allAI && state.humanPlayed){
    const net=(state.players[0].chips+state.players[0].totalBet)-state.humanStart;
    /* showdown tracking */
    const hs=state.humanHandStats||{};
    const sd=state.players.filter(q=>q.hole.length>0&&!q.folded).length>=2;
    if(sd&&!state.players[0].folded){hs.sd=true;if(state.humanWonAmt>0)hs.sdWon=true;}
    {
      const S=state.sessStats;
      if(hs.vpip)S.vpipH=(S.vpipH||0)+1;
      if(hs.pfr)S.pfrH=(S.pfrH||0)+1;
      S.aBets=(S.aBets||0)+(hs.aBets||0); S.aCalls=(S.aCalls||0)+(hs.aCalls||0);
      if(hs.sd){S.sdSeen=(S.sdSeen||0)+1;if(hs.sdWon)S.sdWon=(S.sdWon||0)+1;}
    }
    for(const S of [state.sessStats,lifeStats]){
      if(!S)continue;
      S.hands++; S.net+=net;
      if(state.humanWonAmt>0){S.won++;S.biggest=Math.max(S.biggest,state.humanWonAmt);}
      for(const dd of state.humanDecisions){S.decisions++;if(dd.followed)S.followed++;}
    }
    saveStats();
    renderFeedback(net);
    renderStats();
    /* hand record: in-memory replayer + persistent history (export & analysis) */
    const cs=c=>RANK_CH[c.r]+'shdc'[c.s];
    const entry={
      gameId:state.gameId, t:new Date().toISOString(), hand:state.handNum, level:state.level+1,
      blinds:[state.sb,state.bb], ante:state.ante,
      board:state.board.map(cs),
      players:lastHand.players.map(q=>({name:q.name,avatar:q.avatar,cards:q.hole.map(cs),folded:q.folded,won:q.won})),
      myNet:net, my:{vpip:!!hs.vpip,pfr:!!hs.pfr,aBets:hs.aBets||0,aCalls:hs.aCalls||0,sd:!!hs.sd,sdWon:!!hs.sdWon},
      myDecisions:state.humanDecisions.slice(),
      result:state.resultText, actions:lastHand.log.slice()
    };
    (state.gameHands=state.gameHands||[]).push(entry);
    while(state.gameHands.length>300) state.gameHands.shift();
    try{
      const hist=JSON.parse(localStorage.getItem('sg_poker_history')||'[]');
      hist.push(entry);
      while(hist.length>3000) hist.shift();
      localStorage.setItem('sg_poker_history',JSON.stringify(hist));
    }catch(e){}
  }
  // eliminations
  const stillIn=alive().length;
  let bustedNow=state.players.filter(p=>!p.out&&p.chips===0);
  // order busts: smaller starting position doesn't matter much; assign same place
  for(const p of bustedNow){
    p.out=true; p.place=stillIn; // approximate tie placement
    log(`${p.name} is eliminated (#${p.place})`);
  }
  if(typeof globalThis.__onHandEnd==='function') globalThis.__onHandEnd(state);
  saveResume();
  const human=state.players[0];
  const rest=alive();
  if(state.cfg.allAI){
    if(rest.length<=1){ state.gameOver=true; if(typeof globalThis.__onGameOver==='function') globalThis.__onGameOver(state); return; }
    setTimeout(startHand,pause); return;
  }
  if(human.out){
    state.gameOver=true;
    setTimeout(()=>showGameOver(false,human.place),Math.min(pause,2500));
    return;
  }
  if(rest.length===1){
    state.gameOver=true;
    setTimeout(()=>showGameOver(true,1),Math.min(pause,2500));
    return;
  }
  showNextBtn(pause);
}

/* ================= SOUND ================= */
let audioCtx=null,soundOn=true;
function sfx(kind){
  if(!HAS_DOM||!soundOn)return;
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const t0=audioCtx.currentTime;
    const tone=(f,t,d,vol,type)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=type||'sine';o.frequency.value=f;
      g.gain.setValueAtTime(vol,t0+t);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+t+d);
      o.connect(g);g.connect(audioCtx.destination);
      o.start(t0+t);o.stop(t0+t+d);
    };
    if(kind==='deal'){tone(950,0,0.05,0.045,'triangle');}
    else if(kind==='chip'){tone(1500,0,0.04,0.05,'square');tone(1900,0.05,0.04,0.04,'square');}
    else if(kind==='fold'){tone(220,0,0.08,0.045);}
    else if(kind==='check'){tone(480,0,0.045,0.04);}
    else if(kind==='alert'){tone(660,0,0.11,0.06);tone(880,0.12,0.11,0.05);}
    else if(kind==='win'){tone(523,0,0.12,0.07);tone(659,0.12,0.12,0.07);tone(784,0.24,0.22,0.07);}
  }catch(e){}
}

/* ================= HAPTICS ================= */
function haptic(pat){ if(HAS_DOM&&soundOn&&navigator.vibrate){try{navigator.vibrate(pat);}catch(e){}} }

/* ================= FLYING CHIPS ================= */
function feltCenter(){ const f=$('felt'); return {x:f.clientWidth/2,y:f.clientHeight/2}; }
function flyChips(fromX,fromY,toX,toY,n,delay){
  if(!HAS_DOM)return;
  const felt=$('felt'); if(!felt)return;
  const cols=['#3d6bd6','#e8b64c','#2e9e5b','#c94f4c','#23262d'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='flychip';
    el.style.cssText+=`width:16px;height:16px;border-radius:50%;background:${cols[i%cols.length]};border:2px dashed rgba(255,255,255,.75);box-shadow:0 2px 3px rgba(0,0,0,.5);left:${fromX}px;top:${fromY-i*3}px;opacity:0;`;
    felt.appendChild(el);
    const d=(delay||0)+i*45;
    setTimeout(()=>{el.style.opacity='1';},d);
    setTimeout(()=>{el.style.left=toX+'px';el.style.top=(toY-i*3)+'px';},d+30);
    setTimeout(()=>{el.style.opacity='0';},d+430);
    setTimeout(()=>{el.remove();},d+650);
  }
}
/* slide each player's bet chips into the central pot */
function animateChipsToPot(){
  if(!HAS_DOM||!state)return;
  const c=feltCenter();
  for(const p of state.players){
    if(p.bet<=0)continue;
    const bet=$('bet'+p.i); if(!bet)continue;
    const fx=parseFloat(bet.style.left)||c.x, fy=parseFloat(bet.style.top)||c.y;
    flyChips(fx,fy,c.x,c.y+4,3,0);
  }
}
/* push the pot to the winning seat(s) */
function animatePotToWinner(winners){
  if(!HAS_DOM||!state||!winners||!winners.length)return;
  const c=feltCenter(), felt=$('felt');
  for(const w of winners){
    const seat=$('seat'+w.i); if(!seat)continue;
    const tx=parseFloat(seat.style.left)||c.x, ty=(parseFloat(seat.style.top)||c.y)+40;
    flyChips(c.x,c.y+4,tx,ty,5,120);
  }
}

function chipStackHTML(amount,small){

    let s='<div class="chipcol">';
    for(let i=0;i<n;i++) s+=`<div class="chip" style="--c:${col}"></div>`;
    return s+'</div>';
  }).join('')+'</div>';

function layoutSeats(){
  if(!HAS_DOM||!state)return;
  const felt=$('felt');
  const W=felt.clientWidth,H=felt.clientHeight;
  /* size the ellipse to the REAL seat dimensions so full tables fit on narrow screens */
  let sW=100,sH=96;
  for(const p of state.players){
    const s=$('seat'+p.i);
    if(s&&s.offsetHeight){sW=Math.max(sW,s.offsetWidth);sH=Math.max(sH,s.offsetHeight);}
  }
  const cx=W/2,cy=H/2;
  const rx=Math.min(W*0.41,Math.max(60,(W-sW)/2-4));
  const ry=Math.min(H*0.40,Math.max(60,(H-sH)/2-8));
  const n=state.players.length;
  for(const p of state.players){
    const ang=(90+360*p.i/n)*Math.PI/180;
    const x=cx+rx*Math.cos(ang), y=cy+ry*Math.sin(ang);
    const seat=$('seat'+p.i);
    if(seat){seat.style.left=x+'px'; seat.style.top=(y-28)+'px';}
  }
  /* clamp pass: no seat may leave the felt (offset* geometry — safe under CSS transforms) */
  for(const p of state.players){
    const seat=$('seat'+p.i); if(!seat||!seat.offsetHeight)continue;
    const l=seat.offsetLeft,t=seat.offsetTop,w=seat.offsetWidth,h=seat.offsetHeight;
    let dx=0,dy=0;
    if(t+h>H-2) dy=H-2-(t+h);
    if(t+dy<2)  dy=2-t;
    if(l<1)     dx=1-l;
    if(l+dx+w>W-1) dx=W-1-(l+w);
    if(dx)seat.style.left=(parseFloat(seat.style.left)+dx)+'px';
    if(dy)seat.style.top=(parseFloat(seat.style.top)+dy)+'px';
  }
  /* bet chips: anchored to the seat's FINAL position, pushed toward the table center,
     never on top of the seat box and never inside the board/pot zone */
  for(const p of state.players){
    const seat=$('seat'+p.i), bet=$('bet'+p.i);
    if(!seat||!bet||!seat.offsetHeight)continue;
    const r={width:seat.offsetWidth,height:seat.offsetHeight};
    const scx=seat.offsetLeft+r.width/2, scy=seat.offsetTop+r.height/2;
    let ux=cx-scx, uy=cy-scy;
    const L=Math.hypot(ux,uy)||1; ux/=L; uy/=L;
    const off=Math.max(r.width,r.height)/2+22;          // just outside the seat, toward the middle
    let bx=scx+ux*off, by=scy+uy*off;
    /* rectangular exclusion zone around the board + pot text */
    const ezX=W*0.30, ezY=H*0.16;
    if(Math.abs(bx-cx)<ezX&&Math.abs(by-cy)<ezY){
      const s=Math.min(ezX/Math.max(Math.abs(bx-cx),1), ezY/Math.max(Math.abs(by-cy),1));
      bx=cx+(bx-cx)*s; by=cy+(by-cy)*s;
    }
    bet.style.left=bx+'px'; bet.style.top=by+'px';
  }
  positionDealerBtn();
}

}

/* detect draws that use at least one hole card */
function detectDraws(hole,board){
  const made=evalBest(hole.concat(board));
  const out={flush:false,oesd:false,gutshot:false};
  if(made[0]>=5) return out; // already flush or better, draws moot
  const cards=hole.concat(board);
  const suitCount=[0,0,0,0];
  for(const c of cards) suitCount[c.s]++;
  for(let s=0;s<4;s++)
    if(suitCount[s]===4 && (hole[0].s===s||hole[1].s===s)) out.flush=true;
  if(made[0]!==4){ // no made straight
    const ranks=new Set(cards.map(c=>c.r));
    if(ranks.has(14)) ranks.add(1);
    const boardRanks=new Set(board.map(c=>c.r));
    if(boardRanks.has(14)) boardRanks.add(1);
    for(let lo=1;lo<=10;lo++){
      let cnt=0,bcnt=0,consec=0,maxConsec=0;
      for(let v=lo;v<lo+5;v++){
        if(ranks.has(v)){cnt++;consec++;maxConsec=Math.max(maxConsec,consec);}else consec=0;
        if(boardRanks.has(v))bcnt++;
      }
      if(cnt===4&&bcnt<4){ if(maxConsec>=4) out.oesd=true; else out.gutshot=true; }
    }
  }
  return out;
}
/* classify a made pair/two-pair relative to the board */
function classifyMade(hole,board,score){
  if(board.length===0||score[0]>2) return '';
  const boardRanks=board.map(c=>c.r);
  const boardMax=Math.max(...boardRanks);
  const cnt=r=>boardRanks.filter(x=>x===r).length;
  if(score[0]===1||score[0]===2){
    const pr=score[1];
    if(cnt(pr)>=2) return C('madeBoardPair');
    if(hole[0].r===pr&&hole[1].r===pr) return pr>boardMax?C('madeOverpair'):C('madeUnderPair');
    if(pr===boardMax) return C('madeTopPair');
    if(pr<boardMax) return C('madeNotTop',rankNm(boardMax));
  }
  return '';
}
/* postflop acting order (SB first): who talks before/after the hero */
function postflopOrder(){
  const n=state.players.length, ord=[];
  for(let k=1;k<=n;k++){
    const q=state.players[(state.dealerIdx+k)%n];
    if(!q.out&&!q.folded) ord.push(q);
  }
  return ord;
}
function updateCoach(p){
  if(!HAS_DOM)return;
  const callAmt=Math.min(state.currentBet-p.bet,p.chips);
  const pot=state.players.reduce((s,q)=>s+q.totalBet,0);
  const opps=inHand().length-1;
  const stackBB=(p.chips+p.bet)/state.bb;

  /* order of action on postflop streets (current or upcoming) */
  const ord=postflopOrder().filter(q=>q===p||!q.allIn);
  const ordIdx=ord.indexOf(p);
  const actsFirst=ordIdx===0, actsLast=ordIdx===ord.length-1&&ord.length>1;

  /* equity vs realistic RANGES (not random cards): caps from bets, floors from checks */
  const oppCaps=inHand().filter(q=>q!==p)
    .map(q=>({cap:clamp(q.rangeCap||1,0.03,1),floor:clamp(q.rangeFloor||0,0,0.25)}))
    .sort((a,b)=>a.cap-b.cap).slice(0,4);
  const code=holeCode(p.hole), pr=handPct[code]||1;
  let eq,handDesc,drawRow='',extra=[];
  const tightOpps=oppCaps.filter(o=>o.cap<1).length;
  const weakOpps=oppCaps.filter(o=>o.floor>0).length;
  if(tightOpps>0) extra.push(C('rangesNote',tightOpps,Math.round(Math.min(...oppCaps.map(o=>o.cap))*100)));
  if(weakOpps>0) extra.push(C('checksNote',weakOpps));
  if(state.stage==='preflop'){
    eq=mcEquityR(p.hole,[],oppCaps,500);
    handDesc=`${RANK_CH[p.hole[0].r]}${SUIT_CH[p.hole[0].s]} ${RANK_CH[p.hole[1].r]}${SUIT_CH[p.hole[1].s]} — ${code}, top ~${Math.round(pr*100)}%`;
  }else{
    eq=mcEquityR(p.hole,state.board,oppCaps,500);
    const score=evalBest(p.hole.concat(state.board));
    handDesc=handName(score);
    extra.push(classifyMade(p.hole,state.board,score));
    /* draws (only before the river) */
    if(state.stage!=='river'){
      const d=detectDraws(p.hole,state.board);
      const streets=state.stage==='flop'?2:1;
      const dr=[];
      if(d.flush) dr.push(C('drawFlush',pct(Math.min(0.9,9*0.02*streets+0.02))));
      if(d.oesd) dr.push(C('drawOESD',pct(8*0.02*streets+0.02)));
      else if(d.gutshot) dr.push(C('drawGut',pct(4*0.02*streets+0.01)));
      if(dr.length){
        drawRow=`<div class="coach-row"><span>${T('draws')}</span><b>${dr.join('<br>')}</b></div>`;
        extra.push(C('drawBaked'));
      }
    }
    /* board texture warnings */
    const bs=[0,0,0,0]; for(const c of state.board) bs[c.s]++;
    const score0=score[0];
    if(Math.max(...bs)>=3 && score0<5) extra.push(C('warnFlush'));
    const br=state.board.map(c=>c.r), brCnt={};
    for(const r of br) brCnt[r]=(brCnt[r]||0)+1;
    if(Object.values(brCnt).some(c=>c>=2) && score0<6) extra.push(C('warnPaired'));
    if(opps>=3) extra.push(C('multiway',opps));
  }
  const odds=callAmt>0?callAmt/(pot+callAmt):0;

  /* position adjustment: tighter early, looser late (preflop) */
  const pos=p.pos||'';
  const early=/^(UTG|MP)/.test(pos), late=/(BTN|CO|HJ)/.test(pos);
  const posAdj = state.stage==='preflop'
    ? (early?0.04 : late?-0.03 : 0) + (actsFirst?0.02:0)
    : (actsFirst?0.03 : actsLast?-0.02 : 0);
  if(state.stage==='preflop'){
    if(early) extra.push(C('posEarly',pos));
    else if(late) extra.push(C('posLate',pos));
    /* future position: who talks first once the flop comes */
    if(opps>0){
      if(actsFirst) extra.push(C('futFirst'));
      else if(actsLast) extra.push(C('futLast'));
      else extra.push(C('futMid',T('ord')(ordIdx+1),ord.length));
    }
  }else{
    if(opps>0){
      if(actsFirst) extra.push(C('stFirst'));
      else if(actsLast) extra.push(C('stLast'));
    }
  }

  let rec,why=[];
  if(state.stage==='preflop'){
    const bucket=posBucket(pos), prTxt='top ~'+Math.round(pr*100)+'%';
    const unopened=state.currentBet<=state.bb;
    /* pocket pairs gain implied-odds value when deep: sets are disguised and win stacks */
    const isPair=p.hole[0].r===p.hole[1].r;
    const pairAdj=isPair&&stackBB>=40;
    const prEff=pairAdj?pr*0.8:pr;
    if(stackBB<=10){
      /* Nash push/fold territory */
      const thr=PUSH_THR[bucket];
      if(pr<=thr){
        rec='ALLIN';
        why.push(C('pfShove',Math.round(stackBB),code,prTxt,Math.round(thr*100),pos||'—'));
      }else if(callAmt===0){
        rec='CHECK';
        why.push(C('pfShortCheck',code,pos));
      }else if(eq>=odds+0.07){
        rec='CALL';
        why.push(C('pfShortCall',code,pct(eq),pct(odds)));
      }else{
        rec='FOLD';
        why.push(C('pfShortFold',Math.round(stackBB),code,prTxt,Math.round(thr*100),pos));
      }
    }else if(unopened){
      const thr=OPEN_THR[bucket];
      if(prEff<=thr&&callAmt>0||prEff<=Math.min(thr,0.10)&&callAmt===0){
        rec='RAISE';
        why.push(C('pfOpen',code,prTxt,Math.round(thr*100),pos,pairAdj&&pr>thr));
      }else if(callAmt===0){
        rec='CHECK';
        why.push(C('pfBBfree',code));
      }else{
        rec='FOLD';
        why.push(C('pfOpenFold',code,prTxt,Math.round(thr*100),pos));
      }
    }else{
      /* facing a raise */
      const ct=clamp(0.13+(late?0.05:0)+(early?-0.03:0),0.06,0.25);
      if(pr<=0.05){
        rec='RAISE';
        why.push(C('pf3bet',code));
      }else if(pr<=ct&&eq>=odds){
        rec='CALL';
        why.push(C('pfCallRange',pos,Math.round(ct*100),code,prTxt,pct(eq),pct(odds)));
      }else if(isPair&&callAmt>0&&callAmt<=(p.chips+p.bet)/15){
        rec='CALL';
        why.push(C('pfSetMine',code,usd(callAmt),Math.round((p.chips+p.bet)/callAmt)));
      }else{
        rec='FOLD';
        why.push(C('pfFoldRange',Math.round(ct*100),pos,code,prTxt,pct(eq),pct(odds)));
      }
    }
  }else if(callAmt===0){
    const river=state.stage==='river';
    const checkedToMe=actsLast&&inHand().filter(q=>q!==p&&!q.allIn).some(q=>q.checkedStreet);
    if(eq>0.62){
      rec='RAISE';
      why.push(river?C('valRiver',pct(eq),opps):C('valBet',pct(eq),opps));
    }else if(!river&&checkedToMe&&eq>0.38){
      rec='RAISE';
      why.push(C('stab',pct(eq)));
    }else if(eq>0.42){
      rec='CHECK';
      why.push(river?C('midRiver',pct(eq)):C('midCheck',pct(eq)));
    }else{
      rec='CHECK';
      why.push(river
        ?(actsLast?C('weakRiverLast',pct(eq)):C('weakRiverFirst',pct(eq)))
        :C('weakFree',pct(eq)));
    }
  }else{
    /* a big bet usually means a strong made hand — discount raw equity */
    const betRatio=callAmt/Math.max(pot-callAmt,1);
    const bigBetPen=betRatio>=1?0.10:betRatio>=0.6?0.05:betRatio>=0.35?0.02:0;
    const d=state.stage!=='river'?detectDraws(p.hole,state.board):null;
    const myScore=evalBest(p.hole.concat(state.board));
    const drawOnly=d&&(d.gutshot||d.oesd||d.flush)&&myScore[0]<2;
    /* "no hand, no draw" discipline: a pair that uses a hole card, or a real draw, is showdown value.
       High cards only (or just the board's pair) vs a bet = fold unless the price is absurdly good. */
    const usesHole=myScore[0]>=1&&myScore[0]<=2&&p.hole.some(c=>c.r===myScore[1]);
    const noMade=myScore[0]===0||(myScore[0]<=2&&!usesHole);
    const goodDraw=d&&(d.flush||d.oesd);
    const airPen=(noMade&&!goodDraw)?0.15:0;
    const eqAdj=eq-bigBetPen-airPen;
    const edge=eqAdj-odds-posAdj;
    if(bigBetPen>=0.05) extra.push(C('bigBet',Math.round(betRatio*100)));
    if(d&&d.gutshot&&!d.oesd&&!d.flush&&betRatio>=0.5) extra.push(C('gutWarn'));
    if(airPen) extra.push(C('airWarn'));
    if(eqAdj>0.68+posAdj&&!drawOnly){
      rec='RAISE';
      why.push(C('raiseVal',pct(eq)));
    }else if(edge>=0){
      rec='CALL';
      why.push(C('callOk',usd(callAmt),usd(pot),pct(odds),pct(eq),!!(bigBetPen||airPen),pct(eqAdj)));
    }else{
      rec='FOLD';
      why.push(C('foldAdv',pct(odds),usd(callAmt),usd(pot),pct(eqAdj),!!bigBetPen));
    }
  }
  let sizeRow='', coachT=0;
  if(rec==='RAISE'||rec==='ALLIN'){
    let t = rec==='ALLIN' ? p.bet+p.chips
      : state.stage==='preflop'
      ? Math.max(state.bb*3, state.currentBet*2.6)
      : state.currentBet+Math.max(state.lastRaiseSize,Math.round(pot*0.66));
    coachT=clamp(Math.round(t/state.sb)*state.sb, state.currentBet+state.lastRaiseSize, p.bet+p.chips);
    sizeRow=`<div class="coach-row"><span>${T('sugSize')}</span><b>${usd(coachT)} (${bbs(coachT)})</b></div>`;
    /* pre-set the raise slider to the coach's size so R raises exactly this */
    if($('raiseCtl').style.visibility!=='hidden'){
      const sl=$('raiseSlider');
      sl.value=clamp(coachT,+sl.min,+sl.max); updateRaiseLabel();
    }
  }
  const recLabel = rec==='ALLIN' ? `${T('recALLIN')} ${usd(p.bet+p.chips)}`
    : rec==='RAISE' ? `${state.currentBet>0?T('recRAISETO'):T('recBET')} ${usd(coachT)} · ${bbs(coachT)}`
    : T('rec'+rec);
  $('coachBody').innerHTML=
    `<div class="rec ${rec}">${recLabel}</div>`+
    `<div class="coach-row"><span>${T('yourHand')}</span><b>${handDesc}</b></div>`+
    (pos?`<div class="coach-row"><span>${T('position')}</span><b>${pos}${early?' (early)':late?' (late)':''}</b></div>`:'')+
    (opps>0?`<div class="coach-row"><span>${state.stage==='preflop'?T('postflopOrder'):T('actingOrder')}</span><b>${actsFirst?T('firstToAct'):actsLast?T('lastToAct'):(ordIdx+1)+' '+T('ofN')+' '+ord.length}</b></div>`:'')+
    `<div class="coach-row"><span>${T('winChance')}</span><b>~${pct(eq)} ${T('vs')} ${opps} ${opps>1?T('opps'):T('opp')}</b></div>`+
    drawRow+
    (callAmt>0?`<div class="coach-row"><span>${T('potOdds')}</span><b>${T('need')}${pct(odds)} (${usd(callAmt)} &rarr; ${usd(pot)})</b></div>`:'')+
    `<div class="coach-row"><span>${T('yourStack')}</span><b>${bbs(p.chips+p.bet)}</b></div>`+
    sizeRow+
    `<p class="why">${why.join(' ')}${extra.join('')}</p>`;
  /* rough chip-EV per available action (for blunder tracking) */
  {
    const tEv=clamp(Math.round((state.stage==='preflop'
        ? Math.max(state.bb*3,state.currentBet*2.6)
        : state.currentBet+Math.max(state.lastRaiseSize,Math.round(pot*0.66)))/state.sb)*state.sb,
      state.currentBet+state.lastRaiseSize, p.bet+p.chips);
    const FE=clamp(0.42-0.09*(opps-1),0.08,0.45);            // fold equity vs # of opponents
    const evR=A=>FE*pot+(1-FE)*(eq*(pot+2*A)-A);             // raise A more chips
    coachRecNow={rec,stage:state.stage,evs:{
      FOLD:0,
      CALL:Math.round(callAmt>0 ? eq*(pot+callAmt)-callAmt : eq*pot),
      RAISE:Math.round(evR(rec==='ALLIN' ? p.chips : tEv-p.bet))
    }};
  }

  /* GTO mini-solver: heads-up postflop spots */
  if(state.stage!=='preflop'){
    if(opps===1){
      const villain=inHand().find(q=>q!==p);
      $('coachBody').insertAdjacentHTML('beforeend',`<div id="gtoBox">${C('gtoSolving')}</div>`);
      const turnToken=state.handNum+'-'+state.stage+'-'+state.turnIdx;
      setTimeout(()=>{
        const box=$('gtoBox'); if(!box)return;
        if(state.handNum+'-'+state.stage+'-'+state.turnIdx!==turnToken)return;
        try{
          const res=gtoSolve({
            board:state.board, P0:pot, toCall:callAmt,
            eff:Math.min(p.chips,villain.chips),
            heroCap:p.rangeCap||1, villCap:villain.rangeCap||1, villFloor:villain.rangeFloor||0,
            heroHand:p.hole, villFirst:!villain.acted
          });
          if(!res){box.textContent=C('gtoUnavail');return;}
          const best=res.actions.reduce((a,b)=>b.freq>a.freq?b:a);
          box.innerHTML='<h4>⚖️ GTO MIX (CFR, abstracted)</h4>'+
            res.actions.map(a=>`<div class="grow${a===best?' top':''}"><span>${a.name}</span><span>${Math.round(a.freq*100)}%</span><span>EV ${a.ev>=0?'+':'−'}${usd(Math.abs(Math.round(a.ev)))}</span></div>`).join('')+
            `<div class="gnote">${C('gtoNote')}</div>`;
        }catch(err){box.textContent=C('gtoFail');}
      },40);
    }else{
      $('coachBody').insertAdjacentHTML('beforeend',`<div id="gtoBox"><div class="gnote">${C('gtoMulti',opps)}</div></div>`);
    }
  }
}

function parseCardCode(code){
  return {r:+(RANK_CH_INV[code.slice(0,-1)]||2), s:Math.max(0,'shdc'.indexOf(code.slice(-1)))};

const RANK_CH_INV=Object.fromEntries(Object.entries(RANK_CH).map(([k,v])=>[v,k]));
function rpRender(){
  if(!HAS_DOM)return;
  const arr=rpAll||(state&&state.gameHands)||[];
  const body=$('rpBody');
  if(!arr.length){
    $('rpHandLbl').textContent='—'; $('rpStreetLbl').textContent='—';

    return;
  }
  rpHandIdx=clamp(rpHandIdx,0,arr.length-1);
  const e=arr[rpHandIdx];

  const segs=[[]];
  for(const ln of e.actions){
    if(/^— (Flop|Turn|River):/.test(ln)) segs.push([]);
    segs[segs.length-1].push(ln);
  }
  rpStreet=clamp(rpStreet,0,segs.length-1);
  const final=rpStreet===segs.length-1;
  const boardN=segs.length===1?e.board.length:([0,3,4,5][rpStreet]??e.board.length);
  const shownLog=segs.slice(0,rpStreet+1).flat();
  const net=e.myNet!=null?e.myNet:0;
  const when=rpAll&&e.t?` · ${new Date(e.t).toLocaleDateString()} ${new Date(e.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`:'';
  $('rpHandLbl').textContent=`${T('hand')}#${e.hand} (${rpHandIdx+1}/${arr.length}) · ${net>=0?'+':'−'}${usd(Math.abs(net))}${when}`;
  const stNames=[T('preflop'),T('flop'),T('turnSt'),T('riverSt')];
  $('rpStreetLbl').textContent=segs.length===1&&e.board.length?T('fullHand'):(stNames[rpStreet]||T('preflop'));
  $('rpPrevH').disabled=rpHandIdx<=0; $('rpNextH').disabled=rpHandIdx>=arr.length-1;
  $('rpPrevS').disabled=rpStreet<=0;  $('rpNextS').disabled=rpStreet>=segs.length-1;
  const board=e.board.slice(0,Math.min(boardN,e.board.length)).map(c=>cardHTML(parseCardCode(c))).join('');
  body.innerHTML=
    `<div class="rp-board">${board||'<span style="color:var(--dim);font-size:13px;">(preflop)</span>'}</div>`+
    e.players.map(q=>
      `<div class="rp-row"><span style="font-size:18px;">${q.avatar||''}</span><span class="nm">${q.name}</span>`+
      `<span class="hole">${q.cards.map(c=>cardHTML(parseCardCode(c),true)).join('')}</span>`+
      `<span class="tag${q.won&&final?' win':''}">${final?(q.won?T('won'):q.folded?T('foldedTag'):T('showdown')):''}</span></div>`
    ).join('')+
    (final?`<div class="rp-result">${e.result}</div>`:'')+
    `<div class="rp-log">${shownLog.map(l=>`<div>${l}</div>`).join('')}</div>`;
}

  $('foldBtn').disabled=false;

  const maxTarget=p.bet+p.chips;

  const v=+$('raiseSlider').value;
  const p=state.players[0];
  $('raiseBtn').textContent = (v>=p.bet+p.chips ? T('allin')+' ' : (state.currentBet>0?T('raiseTo'):T('betW')))
    + `${usd(v)} (${bbs(v)})`;

function humanAct(type,amount){
  const p=state.players[state.turnIdx];
  if(!p||!p.isHuman)return;
  const callNow=Math.min(state.currentBet-p.bet,p.chips);
  /* per-hand stat tracking (VPIP / PFR / aggression) */
  const hs=state.humanHandStats;
  if(hs){
    if(state.stage==='preflop'){
      if(type==='raise'){hs.vpip=true;hs.pfr=true;}
      else if(type==='call'&&callNow>0)hs.vpip=true;
    }else{
      if(type==='raise')hs.aBets++;
      else if(type==='call'&&callNow>0)hs.aCalls++;
    }
  }
  if(coachRecNow&&coachRecNow.stage===state.stage){
    const r=coachRecNow.rec;
    const followed = r==='FOLD' ? type==='fold'
      : (r==='CALL'||r==='CHECK') ? type==='call'
      : type==='raise';
    /* EV lost vs the coach's line (rough chip-EV model) */
    let evLoss=0;
    if(coachRecNow.evs){
      const key=t=>t==='fold'?'FOLD':t==='call'?'CALL':'RAISE';
      const recKey=r==='ALLIN'?'RAISE':r==='CHECK'?'CALL':r;
      evLoss=Math.max(0,Math.round((coachRecNow.evs[recKey]||0)-(coachRecNow.evs[key(type)]||0)));
    }
    state.humanDecisions.push({stage:state.stage,rec:r,action:type,followed,evLoss});
    if(evLoss>0){
      state.sessStats.evLost=(state.sessStats.evLost||0)+evLoss;
      (state.gameDecisions=state.gameDecisions||[]).push({hand:state.handNum,stage:state.stage,rec:r,action:type,evLoss});
    }
    coachRecNow=null;
  }
  haptic(type==='raise'?[10,20,10]:8);
  hideActions();
  applyAction(p,type,amount);
  state.turnIdx=(p.i+1)%state.players.length;
  promptNext();
}

  const refreshResume=()=>{
    let sv=null; try{sv=JSON.parse(localStorage.getItem('sg_poker_resume'));}catch(e){}
    $('resumeBtn').classList.toggle('hidden',!sv);
    let nHist=0; try{nHist=(JSON.parse(localStorage.getItem('sg_poker_history')||'[]')).length;}catch(e){}
    $('reviewBtn').classList.toggle('hidden',!nHist);
    return sv;
  };
  refreshResume();
  $('reviewBtn').onclick=showHistoryReplay;
  /* --- clear saved data (human name for localStorage wipe) --- */
  $('resetInfoBtn').onclick=()=>$('resetInfo').classList.toggle('hidden');
  $('resetBtn').onclick=()=>{
    if(!confirm(T('resetConfirm')))return;
    try{
      localStorage.removeItem('sg_poker_stats');
      localStorage.removeItem('sg_poker_history');
      localStorage.removeItem('sg_poker_resume');
    }catch(e){}
    Object.assign(lifeStats,{hands:0,won:0,net:0,biggest:0,decisions:0,followed:0});
    refreshResume();
    if(state&&state.sessStats) renderStats();
    const lbl=$('resetLbl'),old=T('resetData');
    lbl.textContent=T('resetDone');
    setTimeout(()=>{lbl.textContent=T('resetData');},1600);
  };
  $('resumeBtn').onclick=()=>{
    const sv=refreshResume(); if(!sv)return;
    logLines=[];
    $('setup').classList.add('hidden');
    $('game').classList.remove('hidden');
    $('overlay').classList.add('hidden');
    $('tDiff').textContent=sv.cfg.difficulty[0].toUpperCase()+sv.cfg.difficulty.slice(1);
    newGame(sv.cfg);
    state.gameId=sv.gameId||state.gameId;
    state.handNum=sv.handNum; state.dealerIdx=sv.dealerIdx;
    if(sv.sessStats) state.sessStats=Object.assign(state.sessStats,sv.sessStats);
    state.gameDecisions=sv.gameDecisions||[];
    try{ // restore this game's hands for the replayer
      const hist=JSON.parse(localStorage.getItem('sg_poker_history')||'[]');
      state.gameHands=hist.filter(h=>h.gameId===state.gameId);
    }catch(e){}
    sv.players.forEach((q,i)=>{
      const p=state.players[i]; if(!p)return;
      p.name=q.name; p.avatar=q.avatar; p.chips=q.chips; p.out=q.out; p.place=q.place||0;
      if(q.style) p.style=STYLES.find(s=>s.id===q.style)||p.style;
    });
    buildSeats(); hideActions(); lastHand=null;
    $('coachFeed').classList.add('hidden');
    renderStats();
    updateOrient();
    setTimeout(startHand,400);
  };
  /* --- keyboard shortcuts: F fold · C check/call · R raise · 1-4 sizes · N next hand --- */
  $('foldBtn').title='Fold (F)'; $('callBtn').title='Check / Call (C)'; $('raiseBtn').title='Raise (R)';
  $('prMin').title='Min raise (1)'; $('prHalf').title='½ pot (2)'; $('prPot').title='Pot (3)'; $('prMax').title='All-in (4)';
  window.addEventListener('keydown',e=>{
    if(e.metaKey||e.ctrlKey||e.altKey)return;
    const tag=((e.target&&e.target.tagName)||'').toLowerCase();
    if(tag==='input'||tag==='select'||tag==='textarea')return;
    if(!state||$('game').classList.contains('hidden'))return;
    if(!$('replayOv').classList.contains('hidden'))return;
    const k=e.key.toLowerCase();
    if(!$('humanCtls').classList.contains('hidden')){
      if(k==='f'&&!$('foldBtn').disabled){e.preventDefault();humanAct('fold');}
      else if(k==='c'){e.preventDefault();humanAct('call');}
      else if(k==='r'){if($('raiseCtl').style.visibility!=='hidden'){e.preventDefault();humanAct('raise',+$('raiseSlider').value);}}
      else if(k>='1'&&k<='4'){e.preventDefault();$(['prMin','prHalf','prPot','prMax'][+k-1]).click();}
    }else if(k==='n'&&!$('nextHandBtn').classList.contains('hidden')){e.preventDefault();doNextHand();}
  });
  /* --- replayer navigation --- */
  $('rpPrevH').onclick=()=>{rpHandIdx--;rpStreet=99;rpRender();};
  $('rpNextH').onclick=()=>{rpHandIdx++;rpStreet=99;rpRender();};
  $('rpPrevS').onclick=()=>{rpStreet--;rpRender();};
  $('rpNextS').onclick=()=>{rpStreet++;rpRender();};
  $('coachChk').onchange=e=>setCoach(e.target.checked);
  $('coachClose').onclick=()=>setCoach(false);
  setCoach(!isMobile());   // default: docked on desktop, hidden sheet on mobile
  $('autoNext').onchange=e=>{
    if(!e.target.checked){
      clearTimeout(nextTimer);
      /* if a hand just ended, give the user the manual button instead */
      if(state&&!state.gameOver&&state.handOver) $('nextHandBtn').classList.remove('hidden');
    }else if(state&&!state.gameOver&&state.handOver){
      doNextHand();
    }
  };
  $('logToggle').onclick=()=>$('log').classList.toggle('hidden');
  $('replayBtn').onclick=showReplay;
  $('exportBtn').onclick=()=>{
    let hist=[];
    try{hist=JSON.parse(localStorage.getItem('sg_poker_history')||'[]');}catch(e){}
    const payload={exported:new Date().toISOString(),lifetimeStats:lifeStats,handCount:hist.length,hands:hist};
    const blob=new Blob([JSON.stringify(payload,null,1)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='poker-history.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };
  $('rpClose').onclick=()=>$('replayOv').classList.add('hidden');
  $('replayOv').onclick=e=>{if(e.target.id==='replayOv')$('replayOv').classList.add('hidden');};
  $('sndBtn').onclick=()=>{soundOn=!soundOn;$('sndBtn').textContent=soundOn?'🔊':'🔇';};
  $('quitBtn').onclick=()=>{
    if(confirm('Quit this tournament?')){
      state.gameOver=true; clearResume(); hideNextBtn(); hideActions();
      $('game').classList.add('hidden'); $('setup').classList.remove('hidden');
      refreshResume(); updateOrient();
    }
  };
  $('ovBtn').onclick=()=>{
    $('overlay').classList.add('hidden');
    $('game').classList.add('hidden');
    $('setup').classList.remove('hidden');
    refreshResume(); updateOrient();
  };
  window.addEventListener('resize',updateOrient);
  window.addEventListener('orientationchange',()=>setTimeout(updateOrient,250));
}

if(HAS_DOM) initUI();

/* ---------- offline mode (PWA): cache the game so it runs with no internet ---------- */
if(HAS_DOM && 'serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
  try{
    const m=document.createElement('link'); m.rel='manifest'; m.href='manifest.json';
    document.head.appendChild(m);
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }catch(e){}
}

/* ---------- exports for node testing ---------- */
if(typeof module!=='undefined'&&module.exports){
  module.exports={
    makeDeck,shuffle,evalFive,evalSeven,cmpScore,handName,chen,mcEquity,
    newGame,startHand,getState:()=>state,
    setFast(){AI_DELAY_MIN=0;AI_DELAY_MAX=1;RUNOUT_DELAY=1;SHOWDOWN_PAUSE=2;FOLDWIN_PAUSE=2;}
  };
}
</script>
</body>
</html>
